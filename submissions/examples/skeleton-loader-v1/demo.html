<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skeleton Loader — EaseMotion Submission</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
    }
    h2 { font-size: 1.1rem; color: #444; align-self: flex-start; margin: 0; }
    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .demo-row { display: flex; align-items: center; gap: 12px; }
    .demo-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  </style>
</head>
<body>

  <h2>📦 Card Skeleton</h2>
  <div class="demo-card">
    <div class="skeleton skeleton-rect"></div>
    <div class="demo-row">
      <div class="skeleton skeleton-circle"></div>
      <div class="demo-lines">
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text short"></div>
      </div>
    </div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
    <div class="skeleton skeleton-btn"></div>
  </div>

  <h2>👤 Profile Skeleton</h2>
  <div class="demo-card">
    <div class="demo-row">
      <div class="skeleton skeleton-circle" style="width:64px;height:64px;"></div>
      <div class="demo-lines">
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text short"></div>
        <div class="skeleton skeleton-text short"></div>
      </div>
    </div>
  </div>

  <h2>📝 Text Block Skeleton</h2>
  <div class="demo-card">
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

</body>
</html>
